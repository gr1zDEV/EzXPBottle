# ==========================================================
# XPBottle Messages
# ==========================================================

messages:
  no-permission: '&cYou do not have permission to do that.'
  player-only: '&cOnly players can use this command.'
  player-not-found: '&cPlayer not found: &f%player%&c.'
  invalid-amount: '&cPlease enter a valid positive XP amount.'
  not-enough-xp: '&cYou do not have enough XP for that action.'

  withdrew-xp: '&aYou withdrew &f%xp% &aXP into a custom bottle.'
  redeemed-xp: '&aYou redeemed &f%xp% &aXP from a custom bottle.'

  gave-bottle: '&aYou gave &f%player% &aa custom XP bottle containing &f%xp% &aXP.'
  received-bottle: '&aYou received a custom XP bottle containing &f%xp% &aXP.'

  reload-success: '&aXPBottle configurations reloaded successfully.'

  help-lines:
    - '&b&lXPBottle &8- &7Help'
