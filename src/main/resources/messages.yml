    - '&f/xpbottle withdraw <amount> &8- &7Withdraw exact XP into one bottle'
    - '&f/xpbottle give <player> <amount> &8- &7Give a custom XP bottle'
    - '&f/xpbottle reload &8- &7Reload config files'
    - '&f/xpbottle help &8- &7Show this help'
